app:
  backend-uri: ${BACKEND_URI:http://localhost:8081}

spring:
  application:
    name: analytics-gateway

  cloud:
    gateway:
      routes:
        # Route to ad-click-service
        - id: ad-click-service
          uri: ${app.backend-uri}
          predicates:
            - Path=/api/v1/events/**
          filters:
            - StripPrefix=0

        # Route to ad-click-service analytics endpoints
        - id: analytics-service
          uri: ${app.backend-uri}
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - StripPrefix=0

      # CORS — restrict to known origins in production via ALLOWED_ORIGINS env var
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            maxAge: 3600

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

# Logging
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.tutorialq.systemdesign.analytics: INFO

server:
  port: 8080
