# Replace adsplatformdevacr.azurecr.io with Terraform output: terraform output acr_login_server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-click-service
  namespace: ads-platform
  labels:
    app: ad-click-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-click-service
  template:
    metadata:
      labels:
        app: ad-click-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ads-platform-sa
      automountServiceAccountToken: true
      containers:
        - name: ad-click-service
          image: adsplatformdevacr.azurecr.io/ad-click-service:v2
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_R2DBC_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_R2DBC_URL
            - name: SPRING_R2DBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: SPRING_FLYWAY_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_JDBC_URL
            - name: SPRING_FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: SPRING_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_BOOTSTRAP_SERVERS
            # SASL/SSL config for Azure Event Hubs Kafka protocol
            - name: SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
              value: "SASL_SSL"
            - name: SPRING_KAFKA_PROPERTIES_SASL_MECHANISM
              value: "PLAIN"
            - name: SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG
              valueFrom:
                secretKeyRef:
                  name: eventhubs-sasl-secret
                  key: SASL_JAAS_CONFIG
          resources:
            requests:
              memory: "768Mi"
              cpu: "250m"
            limits:
              memory: "1536Mi"
              cpu: "750m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
          # Mount Key Vault secrets volume (required for CSI sync to work)
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: azure-kv-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ad-click-service
  namespace: ads-platform
spec:
  selector:
    app: ad-click-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
