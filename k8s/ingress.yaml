# NGINX Ingress Controller must be installed first:
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm install ingress-nginx ingress-nginx/ingress-nginx \
#     --namespace ingress-nginx --create-namespace \
#     --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path"=/healthz
#
# For TLS with Let's Encrypt, install cert-manager:
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager \
#     --namespace cert-manager --create-namespace \
#     --set crds.enabled=true
#
# Then uncomment the ClusterIssuer and tls sections below.

# ---
# apiVersion: cert-manager.io/v1
# kind: ClusterIssuer
# metadata:
#   name: letsencrypt-prod
# spec:
#   acme:
#     server: https://acme-v02.api.letsencrypt.org/directory
#     email: your-email@example.com
#     privateKeySecretRef:
#       name: letsencrypt-prod
#     solvers:
#       - http01:
#           ingress:
#             class: nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ads-platform-ingress
  namespace: ads-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    # Uncomment for TLS:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # Uncomment for TLS:
  # tls:
  #   - hosts:
  #       - ads-api.yourdomain.com
  #     secretName: ads-platform-tls
  rules:
    - http:
        paths:
          - path: /api/v1/events
            pathType: Prefix
            backend:
              service:
                name: analytics-gateway
                port:
                  number: 80
          - path: /api/v1/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-gateway
                port:
                  number: 80
