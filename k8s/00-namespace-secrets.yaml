apiVersion: v1
kind: Namespace
metadata:
  name: ads-platform
  labels:
    app.kubernetes.io/part-of: ads-platform
---
# Service account with Workload Identity annotation.
# Pods using this SA authenticate as the Azure Managed Identity
# (no secrets or connection strings needed in the pod spec).
#
# Replace <APP_IDENTITY_CLIENT_ID> and <TENANT_ID> with Terraform outputs:
#   terraform output app_identity_client_id
#   terraform output tenant_id
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ads-platform-sa
  namespace: ads-platform
  annotations:
    azure.workload.identity/client-id: "<APP_IDENTITY_CLIENT_ID>"
  labels:
    azure.workload.identity/use: "true"
---
# SecretProviderClass: mounts Key Vault secrets into pods as files/env vars.
# Replace <KEYVAULT_NAME>, <TENANT_ID> with Terraform outputs.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-secrets
  namespace: ads-platform
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "<APP_IDENTITY_CLIENT_ID>"
    keyvaultName: "<KEYVAULT_NAME>"
    tenantId: "<TENANT_ID>"
    objects: |
      array:
        - |
          objectName: postgres-host
          objectType: secret
        - |
          objectName: postgres-username
          objectType: secret
        - |
          objectName: postgres-password
          objectType: secret
        - |
          objectName: postgres-jdbc-url
          objectType: secret
        - |
          objectName: postgres-r2dbc-url
          objectType: secret
        - |
          objectName: eventhubs-bootstrap-servers
          objectType: secret
        - |
          objectName: eventhubs-connection-string
          objectType: secret
  # Sync secrets to a Kubernetes Secret so they can be used as env vars
  secretObjects:
    - secretName: app-secrets
      type: Opaque
      data:
        - objectName: postgres-host
          key: DB_HOST
        - objectName: postgres-username
          key: DB_USER
        - objectName: postgres-password
          key: DB_PASSWORD
        - objectName: postgres-jdbc-url
          key: DB_JDBC_URL
        - objectName: postgres-r2dbc-url
          key: DB_R2DBC_URL
        - objectName: eventhubs-bootstrap-servers
          key: KAFKA_BOOTSTRAP_SERVERS
        - objectName: eventhubs-connection-string
          key: EVENTHUBS_CONNECTION_STRING
