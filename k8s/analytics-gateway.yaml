apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-gateway
  namespace: ads-platform
  labels:
    app: analytics-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-gateway
  template:
    metadata:
      labels:
        app: analytics-gateway
    spec:
      containers:
        - name: analytics-gateway
          image: adsplatformdevacr.azurecr.io/analytics-gateway:v2
          ports:
            - containerPort: 8080
          env:
            # Override backend URI to point to K8s service DNS name
            - name: BACKEND_URI
              value: "http://ad-click-service.ads-platform.svc.cluster.local:8081"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-gateway
  namespace: ads-platform
spec:
  selector:
    app: analytics-gateway
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
