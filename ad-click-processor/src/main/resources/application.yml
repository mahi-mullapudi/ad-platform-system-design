spring:
  application:
    name: ad-click-processor

# Flink Configuration
flink:
  job-name: ad-click-processor
  parallelism: ${FLINK_PARALLELISM:4}
  checkpoint-dir: ${FLINK_CHECKPOINT_DIR:file:///tmp/flink-checkpoints}
  checkpoint-interval: 60000
  kafka:
    bootstrap-servers: ${FLINK_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    source-topic: ${FLINK_KAFKA_SOURCE_TOPIC:ad-click-events}
    sink-topic: ${FLINK_KAFKA_SINK_TOPIC:ad-click-aggregations}
    consumer-group: ${FLINK_KAFKA_CONSUMER_GROUP:ad-click-processor}
    security-protocol: ${FLINK_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    sasl-mechanism: ${FLINK_KAFKA_SASL_MECHANISM:}
    sasl-jaas-config: ${FLINK_KAFKA_SASL_JAAS_CONFIG:}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

# Logging
logging:
  level:
    com.tutorialq.systemdesign.processor: INFO
    org.apache.flink: INFO

server:
  port: 8083
