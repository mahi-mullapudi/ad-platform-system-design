spring:
  application:
    name: ad-click-service

  # R2DBC Configuration for reactive access
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ads_platform
    username: ads_user
    password: ads_password
    pool:
      initial-size: 10
      max-size: 50
      max-idle-time: 30m
      max-acquire-time: 3s
      max-create-connection-time: 5s

  # Flyway Configuration for schema migrations (uses JDBC)
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/ads_platform
    user: ads_user
    password: ads_password
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    com.tutorialq.systemdesign.adclick: DEBUG
    org.springframework.data.r2dbc: DEBUG
    io.r2dbc.postgresql: DEBUG

server:
  port: 8081
